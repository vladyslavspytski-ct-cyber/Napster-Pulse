<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Prevent FOUC: Apply theme before page renders -->
    <script>
      (function() {
        const storageKey = 'theme';
        const theme = localStorage.getItem(storageKey);
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        const isDark = theme === 'dark' || (theme !== 'light' && systemDark);

        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }

        // Set color-scheme for native elements
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      })();
    </script>
    <!-- Prevent white flash with immediate background color -->
    <style>
      html { background-color: hsl(210 20% 98%); }
      html.dark { background-color: hsl(220 20% 8%); }
    </style>
    <title>Napster Pulse</title>
    <meta name="description" content="Create and participate in voice-based interviews. Easy, fast, and insightful." />
    <meta name="author" content="Napster Pulse" />

    <meta property="og:title" content="Napster Pulse" />
    <meta property="og:description" content="Create and participate in voice-based interviews. Easy, fast, and insightful." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
